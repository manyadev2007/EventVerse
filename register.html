<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration | EventVerse</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="registration-page">

<section class="registration-section">
    <div class="registration-box">
        <h1>Event Registration</h1>
        <p>Fill your details to register for the event.</p>

        <form id="eventRegistrationForm">
            <input type="text" id="full_name" placeholder="Full Name" required>
            <input type="text" id="usn" placeholder="USN" required>
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="tel" id="phone" placeholder="Phone Number" required>

            <select id="department" required>
                <option value="">Select Department</option>
                <option>CSE</option>
                <option>ISE</option>
                <option>ECE</option>
                <option>EEE</option>
                <option>ME</option>
                <option>CIVIL</option>
            </select>

            <select id="event_name" required>
                <option value="">Select Event</option>
                 <option>AI Hackathon</option>
    <option>Code Sprint</option>
    <option>Debugging Battle</option>
    <option>Tech Quiz</option>

    <!-- Cultural -->
    <option>Dance Competition</option>
    <option>Singing Competition</option>
    <option>Fashion Show</option>
    <option>Drama Competition</option>

    <!-- Sports -->
    <option>Cricket Tournament</option>
    <option>Football Championship</option>
    <option>Basketball Tournament</option>
    <option>Badminton Competition</option>

    <!-- Workshops -->
    <option>AI Workshop</option>
    <option>Web Development Workshop</option>
    <option>UI/UX Design Workshop</option>
    <option>Cyber Security Workshop</option>
            </select>

            <button type="submit">Confirm Registration</button>
        </form>
    </div>
</section>

<script>
document.getElementById("eventRegistrationForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const data = {
        full_name: document.getElementById("full_name").value,
        usn: document.getElementById("usn").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phone").value,
        department: document.getElementById("department").value,
        event_name: document.getElementById("event_name").value
    };

    try {
        const response = await fetch("http://localhost:3000/event-register", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await response.json();
        alert(result.message);
    } catch (error) {
        alert("Registration failed. Backend not connected.");
        console.log(error);
    }
});

window.onload = function () {
    const params = new URLSearchParams(window.location.search);
    const selectedEvent = params.get("event");

    if (selectedEvent) {
        document.getElementById("event_name").value = selectedEvent;
    }
};
</script>
</body>
</html>
