<script>
document.getElementById("eventRegistrationForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const data = {
        full_name: document.getElementById("full_name").value,
        usn: document.getElementById("usn").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phone").value,
        department: document.getElementById("department").value,
        event_name: document.getElementById("event_name").value
    };

    try {
        const response = await fetch("https://eventverse-manya.onrender.com/event-register", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await response.json();
        alert(result.message);
    }
    catch (error) {
        alert("Registration failed. Backend not connected.");
        console.log(error);
    }
});
</script>
