<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration | EventVerse</title>

    <link rel="stylesheet" href="style.css">
</head>

<body class="registration-page">

<header class="ev-navbar">
    <div class="ev-brand">
        <img src="images/eventverse-logo.png" alt="EventVerse Logo">
        <div>
            <h2>Event<span>Verse</span></h2>
            <p>Your Campus. Your Events.</p>
        </div>
    </div>

    <nav>
        <a href="home.html" class="active">Home</a>
        <a href="events.html">Events</a>
        <a href="about.html">About</a>
<a href="contact.html">Contact</a>
        <a href="login.html" class="login-btn">Login</a>
        <a href="registration.html" class="register-btn">Register</a>
    </nav>
</header>

    <section class="registration-section">

        <div class="registration-box">

            <h1>Event Registration</h1>
            <p>Fill your details to register for the event.</p>

            <form id="eventRegistrationForm">
    <input type="text" id="full_name" placeholder="Full Name" required>
    <input type="text" id="usn" placeholder="USN" required>
    <input type="email" id="email" placeholder="Email Address" required>
    <input type="tel" id="phone" placeholder="Phone Number" required>

    <select id="department" required>
        <option value="">Select Department</option>
        <option>CSE</option>
        <option>ISE</option>
        <option>ECE</option>
        <option>EEE</option>
        <option>ME</option>
        <option>CIVIL</option>
    </select>

    <input type="text" id="event_name" placeholder="Event Name" readonly>

    <button type="submit">Confirm Registration</button>
</form>

<script>
document.getElementById("eventRegistrationForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const data = {
        full_name: document.getElementById("full_name").value,
        usn: document.getElementById("usn").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phone").value,
        department: document.getElementById("department").value,
        event_name: document.getElementById("event_name").value
    };

    const response = await fetch("http://localhost:3000/event-register", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    });

    const result = await response.json();
    alert(result.message);
});
</script>
        </div>

    </section>
    <script>
const params = new URLSearchParams(window.location.search);
const eventName = params.get("event");

if(eventName){
    document.getElementById("event_name").value = eventName;
}
</script>

</body>
</html>
