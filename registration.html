<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | EventVerse</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="registration-page">

<header class="ev-navbar">
    <div class="ev-brand">
        <img src="images/eventverse-logo.png" alt="EventVerse Logo">
        <div>
            <h2>Event<span>Verse</span></h2>
            <p>Your Campus. Your Events.</p>
        </div>
    </div>

    <nav>
        <a href="home.html" class="active">Home</a>
        <a href="events.html">Events</a>
       <a href="about.html">About</a>
<a href="contact.html">Contact</a>
        <a href="login.html" class="login-btn">Login</a>
        <a href="registration.html" class="register-btn">Register</a>
    </nav>
</header>
    <section class="registration-section">
        <div class="registration-box">

            <h1>Create Account</h1>
            <p>Join EventVerse to explore and register for events.</p>

           <form id="studentRegisterForm">
    <input type="text" id="full_name" placeholder="Full Name" required>
    <input type="text" id="usn" placeholder="USN" required>
    <input type="email" id="email" placeholder="Email Address" required>
    <input type="password" id="password" placeholder="Password" required>
    <input type="password" id="confirm_password" placeholder="Confirm Password" required>

    <button type="submit">Create Account</button>
</form>

<script>
document.getElementById("studentRegisterForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirm_password").value;

    if(password !== confirmPassword){
        alert("Passwords do not match");
        return;
    }

    const data = {
        full_name: document.getElementById("full_name").value,
        usn: document.getElementById("usn").value,
        email: document.getElementById("email").value,
        password: password
    };

    const response = await fetch("http://localhost:3000/student-register", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    });

    const result = await response.json();
    alert(result.message);
});
</script>

            <p style="margin-top:18px;">
                Already have an account?
                 <a href="login.html" style="color:#60a5fa;">Login here</a>
            </p>

        </div>
    </section>

</body>
</html>
